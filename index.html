<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Reboot 2026</title>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin-top: 0; color: var(--primary); }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background-color: #4f46e5;
            transform: translateY(-2px);
        }

        #output {
            margin-top: 1.5rem;
            font-weight: 500;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fresh Start</h1>
        <p>This is a clean, modern setup. Everything is in one file so GitHub can't "lose" your styles.</p>
        
        <button id="actionBtn">Initialize Project</button>
        
        <div id="output"></div>
    </div>

    <script>
        const button = document.getElementById('actionBtn');
        const output = document.getElementById('output');

        button.addEventListener('click', () => {
            const now = new Date().toLocaleTimeString();
            output.innerText = `✅ System Online at ${now}`;
            button.innerText = "Working!";
            
            // Subtle animation
            output.style.color = "#10b981"; 
        });
    </script>
</body>
</html>
