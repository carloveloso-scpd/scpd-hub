<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Project</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background-color: #2da44e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Project Restored</h1>
        <p>If you can see this with a white box and green button, your CSS is working!</p>
        <button id="magicButton">Click for Magic</button>
        <p id="message"></p>
    </div>

    <script>
        const btn = document.getElementById('magicButton');
        const msg = document.getElementById('message');

        btn.addEventListener('click', () => {
            msg.innerText = "✨ JavaScript is working too!";
            btn.style.backgroundColor = "#0969da"; // Change to GitHub Blue
        });
    </script>
</body>
</html>
